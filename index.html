<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Virtual Bubble Wrap</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --s1: #c2d0da;
      --s2: #b5c5d0;
      --s3: #c8d5de;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #edf1f5;
    }

    /* ─── Color themes (change sheet backdrop) ───────────────────────────── */
    .theme-pink   { --s1:#d8a8b8; --s2:#c895a8; --s3:#d4a5b5; }
    .theme-green  { --s1:#98c4a8; --s2:#88b498; --s3:#94c0a4; }
    .theme-blue   { --s1:#7aa0cc; --s2:#6a90bc; --s3:#77a0cc; }
    .theme-purple { --s1:#b0a0c8; --s2:#a090b8; --s3:#ad9ec6; }

    /* ─── Sheet ─────────────────────────────────────────────────────────── */
    #sheet-container {
      position: relative;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(255,255,255,0.08) 0%, transparent 60%),
        linear-gradient(145deg, var(--s1) 0%, var(--s2) 50%, var(--s3) 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: grab;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #bubble-grid { display: grid; }

    /* ─── Bubble states ──────────────────────────────────────────────────── */
    .bubble { border-radius: 50%; will-change: transform; }

    .bubble-unpopped {
      cursor: inherit;
      background: radial-gradient(
        ellipse at 33% 28%,
        rgba(255,255,255,0.97)   0%,
        rgba(242,251,255,0.89)  17%,
        rgba(218,237,250,0.79)  36%,
        rgba(193,217,237,0.69)  56%,
        rgba(168,199,222,0.61)  74%,
        rgba(150,184,210,0.57) 100%
      );
      box-shadow:
        0 4px 11px rgba(0,0,0,0.23), 0 1px 3px rgba(0,0,0,0.15),
        inset 0 -3px 6px rgba(65,100,132,0.21),
        inset 0 4px 9px rgba(255,255,255,0.78);
      transition: transform 0.05s ease-out, box-shadow 0.05s ease-out;
    }

    .bubble-unpopped:hover {
      box-shadow:
        0 6px 14px rgba(0,0,0,0.27), 0 2px 4px rgba(0,0,0,0.16),
        inset 0 -3px 6px rgba(65,100,132,0.21),
        inset 0 4px 9px rgba(255,255,255,0.78);
    }

    @keyframes pop-anim {
      0%   { transform: scale(1);                    opacity: 1;    }
      18%  { transform: scale(0.83);                 opacity: 0.97; }
      36%  { transform: scale(0.89);                 opacity: 0.92; }
      68%  { transform: scale(0.71);                 opacity: 0.83; }
      100% { transform: scale(0.67) translateY(2px); opacity: 0.72; }
    }

    .bubble-popping {
      animation: pop-anim 0.14s cubic-bezier(0.36,0.07,0.19,0.97) forwards;
      cursor: default; pointer-events: none;
    }

    .bubble-popped {
      cursor: default; pointer-events: none;
      background: radial-gradient(
        ellipse at 50% 63%,
        rgba(115,136,152,0.73) 0%, rgba(136,156,170,0.57) 28%,
        rgba(156,173,186,0.41) 58%, rgba(172,187,200,0.27) 100%
      );
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.31), inset 0 0 9px rgba(0,0,0,0.14);
      transform: scale(0.67) translateY(2px); opacity: 0.72;
    }

    /* Ghost mode re-inflate */
    @keyframes reinflate-anim {
      0%   { transform: scale(0.67) translateY(2px); opacity: 0.72; }
      60%  { transform: scale(1.07); opacity: 1; }
      100% { transform: scale(1);   opacity: 1; }
    }

    .bubble-reinflating {
      animation: reinflate-anim 0.38s cubic-bezier(0.34,1.56,0.64,1) forwards;
      pointer-events: none;
      background: radial-gradient(
        ellipse at 33% 28%,
        rgba(255,255,255,0.97) 0%, rgba(242,251,255,0.89) 17%,
        rgba(218,237,250,0.79) 36%, rgba(193,217,237,0.69) 56%,
        rgba(168,199,222,0.61) 74%, rgba(150,184,210,0.57) 100%
      );
      box-shadow:
        0 4px 11px rgba(0,0,0,0.23), 0 1px 3px rgba(0,0,0,0.15),
        inset 0 -3px 6px rgba(65,100,132,0.21),
        inset 0 4px 9px rgba(255,255,255,0.78);
    }


    /* ─── Controls ──────────────────────────────────────────────────────── */
    .ctrl-label {
      display: flex; align-items: center; gap: 5px;
      cursor: pointer; font-size: 13px; font-weight: 500;
      color: #374151; padding: 4px 9px; border-radius: 7px;
      transition: background 0.1s; white-space: nowrap;
    }
    .ctrl-label:hover { background: rgba(0,0,0,0.06); }
    .ctrl-label input[type=checkbox] { cursor: pointer; width: 14px; height: 14px; accent-color: #3b82f6; }

    .sub-hint { font-size: 10px; color: #9ca3af; padding-left: 11px; line-height: 1.2; }

    #btn-fresh {
      background: #3b82f6; color: #fff; border: none;
      padding: 5px 15px; border-radius: 7px; font-size: 13px;
      font-weight: 600; cursor: pointer; letter-spacing: 0.01em;
      transition: background 0.1s, transform 0.08s;
      align-self: flex-start;
    }
    #btn-fresh:hover  { background: #2563eb; }
    #btn-fresh:active { transform: scale(0.95); }

    /* ─── Tool buttons (size presets, etc.) ──────────────────────────────── */
    .tool-btn {
      padding: 2px 7px; border: 1px solid #d1d5db; border-radius: 4px;
      font-size: 11.5px; font-weight: 500; cursor: pointer;
      background: white; color: #6b7280; transition: all 0.1s; line-height: 1.4;
    }
    .tool-btn:hover { border-color: #9ca3af; color: #374151; }
    .tool-btn.active { background: #3b82f6; border-color: #3b82f6; color: white; }

    /* ─── Color swatches ────────────────────────────────────────────────── */
    .swatch {
      width: 15px; height: 15px; border-radius: 50%;
      border: 2px solid transparent; cursor: pointer;
      transition: transform 0.1s, border-color 0.1s; flex-shrink: 0;
    }
    .swatch:hover { transform: scale(1.25); }
    .swatch.active { border-color: #374151; }

    /* ─── Stats ─────────────────────────────────────────────────────────── */
    .stat-label { font-size: 12.5px; color: #6b7280; white-space: nowrap; }
    .stat-val   { font-weight: 700; color: #111827; margin-left: 3px; }
    .stat-sep   { color: #d1d5db; margin: 0 8px; font-size: 13px; }

    @keyframes sparkle {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(1.12); }
    }
    .sparkle { animation: sparkle 0.38s ease-in-out 4; }

    /* Pop counter bump */
    @keyframes count-bump {
      0%   { transform: scale(1); color: #111827; }
      40%  { transform: scale(1.55); color: #3b82f6; }
      100% { transform: scale(1); color: #111827; }
    }
    .count-bump { animation: count-bump 0.22s ease-out; display: inline-block; }


    /* ─── Manic cursor ──────────────────────────────────────────────────── */
    #sheet-container.grabbing      { cursor: grabbing; }
    #sheet-container.manic-cursor  { cursor: crosshair; }

    /* ─── Kbd hint ──────────────────────────────────────────────────────── */
    #kbd-hint {
      font-size: 10.5px; color: #9ca3af;
      text-align: center; padding-bottom: 2px; pointer-events: none;
    }
  </style>
</head>
<body>

<div id="app" class="flex flex-col" style="height:100dvh; min-height:100vh;">

  <!-- Header ─────────────────────────────────────────────────────────── -->
  <header class="flex-shrink-0 flex items-center justify-center pt-2 pb-1 px-4">
    <h1 id="app-title" class="text-2xl font-bold text-gray-800 tracking-tight select-none">
      Virtual Bubble Wrap
    </h1>
  </header>

  <!-- Controls ───────────────────────────────────────────────────────── -->
  <div class="flex-shrink-0 flex items-start justify-center gap-0.5 py-1 px-3 flex-wrap">

    <div style="display:flex;flex-direction:column;align-items:flex-start;">
      <label class="ctrl-label"><input type="checkbox" id="chk-sound" checked> Sound On</label>
      <span class="sub-hint">on mobile, ringer must be on</span>
    </div>

    <span class="stat-sep" style="padding-top:6px;">|</span>

    <div style="display:flex;flex-direction:column;align-items:flex-start;">
      <label class="ctrl-label"><input type="checkbox" id="chk-manic"> Pop Mania</label>
      <span class="sub-hint">hold, drag and go wild</span>
    </div>

    <span class="stat-sep" style="padding-top:6px;">|</span>

    <div style="display:flex;flex-direction:column;align-items:flex-start;">
      <label class="ctrl-label"><input type="checkbox" id="chk-ghost"> Ghost Mode</label>
      <span class="sub-hint">re-inflate after 100%</span>
    </div>

    <span class="stat-sep" style="padding-top:6px;">|</span>

    <div style="display:flex;align-items:center;gap:3px;padding-top:4px;">
      <button class="tool-btn" data-size="80">S</button>
      <button class="tool-btn active" data-size="56">M</button>
      <button class="tool-btn" data-size="36">L</button>
      <button class="tool-btn" data-size="26">XL</button>
    </div>

    <span class="stat-sep" style="padding-top:6px;">|</span>

    <div style="display:flex;align-items:center;gap:4px;padding-top:6px;">
      <button class="swatch active" data-theme=""       style="background:#c2d0da;" title="Clear"></button>
      <button class="swatch"        data-theme="pink"   style="background:#d8a8b8;" title="Pink"></button>
      <button class="swatch"        data-theme="green"  style="background:#98c4a8;" title="Green"></button>
      <button class="swatch"        data-theme="blue"   style="background:#7aa0cc;" title="Blue"></button>
      <button class="swatch"        data-theme="purple" style="background:#b0a0c8;" title="Purple"></button>
    </div>

    <span class="stat-sep" style="padding-top:6px;">|</span>

    <div style="display:flex;align-items:center;gap:4px;padding-top:4px;">
      <button id="btn-fresh">Fresh Sheet</button>
      <button id="btn-share" class="tool-btn">Share</button>
    </div>

  </div>

  <!-- Stats ──────────────────────────────────────────────────────────── -->
  <div class="flex-shrink-0 flex items-center justify-center py-0.5 px-3">
    <span class="stat-label">Popped: <span id="stat-popped" class="stat-val">0</span></span>
    <span class="stat-sep">·</span>
    <span class="stat-label">Complete: <span id="stat-pct" class="stat-val">0%</span></span>
    <span class="stat-sep">·</span>
    <span class="stat-label">Per sec: <span id="stat-bps" class="stat-val">0</span></span>
  </div>

  <!-- Bubble sheet ───────────────────────────────────────────────────── -->
  <div class="flex-1 overflow-hidden px-3 pb-2" style="min-height:0;">
    <div id="sheet-container" class="w-full h-full">
      <div id="bubble-grid"></div>
    </div>
  </div>

  <!-- Keyboard hint -->
  <div id="kbd-hint" class="flex-shrink-0">
    M = Pop Mania &nbsp;·&nbsp; S = Sound &nbsp;·&nbsp; R = Fresh Sheet
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// AudioManager
// public/audio/pop.*   → custom pop sound
// public/audio/fresh.* → custom fresh-sheet sound
// Falls back to Web Audio synthesis when files are absent.
// ═══════════════════════════════════════════════════════════════════════════
class AudioManager {
  constructor() {
    this._ctx      = null;
    this.enabled   = true;
    this._unlocked = false;
    this._popBuf   = null;
    this._freshBuf = null;
    this._tryLoadAssets();

    // iOS Safari requires a silent buffer played inside a user gesture
    const unlock = () => this._unlock();
    document.addEventListener('touchstart', unlock, { once: true, capture: true });
    document.addEventListener('touchend',   unlock, { once: true, capture: true });
    document.addEventListener('mousedown',  unlock, { once: true, capture: true });
  }

  _getCtx() {
    if (!this._ctx) this._ctx = new (window.AudioContext || window.webkitAudioContext)();
    return this._ctx;
  }

  async _unlock() {
    if (this._unlocked) return;
    this._unlocked = true;
    try {
      const ctx = this._getCtx();
      await ctx.resume();
      const silent = ctx.createBuffer(1, 1, ctx.sampleRate);
      const src = ctx.createBufferSource();
      src.buffer = silent;
      src.connect(ctx.destination);
      src.start(0);
    } catch (_) {}
  }

  _withCtx(fn) {
    const ctx = this._getCtx();
    if (ctx.state === 'running') { fn(ctx); return; }
    ctx.resume().then(() => fn(ctx)).catch(() => {});
  }

  async _tryLoadAssets() {
    const pairs = [
      ['_popBuf',   ['public/audio/pop.mp3',   'public/audio/pop.wav',   'public/audio/pop.ogg']],
      ['_freshBuf', ['public/audio/fresh.mp3', 'public/audio/fresh.wav', 'public/audio/fresh.ogg']],
    ];
    for (const [prop, paths] of pairs) {
      for (const path of paths) {
        try {
          const res = await fetch(path);
          if (!res.ok) continue;
          this[prop] = await res.arrayBuffer();
          break;
        } catch (_) {}
      }
    }
  }

  async _playRaw(arrayBuffer, vol = 0.85) {
    this._withCtx(async ctx => {
      try {
        const decoded = await ctx.decodeAudioData(arrayBuffer.slice(0));
        const src = ctx.createBufferSource();
        src.buffer = decoded;
        const gain = ctx.createGain();
        gain.gain.value = vol;
        src.connect(gain);
        gain.connect(ctx.destination);
        src.start();
      } catch (_) {}
    });
  }

  pop() {
    if (!this.enabled) return;
    if (this._popBuf) { this._playRaw(this._popBuf, 0.65 + Math.random() * 0.35); return; }

    this._withCtx(ctx => {
      try {
        const t = ctx.currentTime;
        const baseFreq = 190 + Math.random() * 290;
        const vol      = 0.17 + Math.random() * 0.24;
        const dur      = 0.050 + Math.random() * 0.052;

        const n = Math.ceil(ctx.sampleRate * dur);
        const buf = ctx.createBuffer(1, n, ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < n; i++) d[i] = (Math.random()*2-1) * Math.exp(-i/(n*0.10));

        const src = ctx.createBufferSource(); src.buffer = buf;
        const bp = ctx.createBiquadFilter();
        bp.type = 'bandpass'; bp.frequency.value = baseFreq;
        bp.Q.value = 0.45 + Math.random() * 0.95;
        const hs = ctx.createBiquadFilter();
        hs.type = 'highshelf'; hs.frequency.value = 2600;
        hs.gain.value = 4 + Math.random() * 3;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(vol, t);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + dur * 1.6);

        src.connect(bp); bp.connect(hs); hs.connect(gain); gain.connect(ctx.destination);
        src.start(t); src.stop(t + dur * 2);
      } catch (_) {}
    });
  }

  // Ascending 3-note chime played on sheet completion
  completion() {
    if (!this.enabled) return;
    this._withCtx(ctx => {
      [0, 0.13, 0.28].forEach((delay, i) => {
        const freq = [523, 659, 784][i]; // C5 E5 G5
        const t = ctx.currentTime + delay;
        const osc = ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, t);
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.28, t + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(t); osc.stop(t + 0.5);
      });
    });
  }

  fresh() {
    if (!this.enabled || !this._freshBuf) return;
    this._playRaw(this._freshBuf, 0.9);
  }

  setEnabled(v) { this.enabled = v; }
}

// ═══════════════════════════════════════════════════════════════════════════
// App state
// ═══════════════════════════════════════════════════════════════════════════
const audio = new AudioManager();

const state = {
  soundEnabled:  true,
  manicMode:     false,
  ghostMode:     false,
  isPointerDown: false,
  cellSize:      56,   // S=80 M=56(default) L=36 XL=26
  poppedCount:   0,
  totalBubbles:  0,
};

const popTimes = []; // rolling timestamps for BPS

// ═══════════════════════════════════════════════════════════════════════════
// DOM references
// ═══════════════════════════════════════════════════════════════════════════
const $sheet      = document.getElementById('sheet-container');
const $grid       = document.getElementById('bubble-grid');
const $statPop    = document.getElementById('stat-popped');
const $statPct    = document.getElementById('stat-pct');
const $statBps    = document.getElementById('stat-bps');
const chkSound    = document.getElementById('chk-sound');
const chkManic    = document.getElementById('chk-manic');
const chkGhost    = document.getElementById('chk-ghost');
const btnFresh    = document.getElementById('btn-fresh');
const btnShare    = document.getElementById('btn-share');

// ═══════════════════════════════════════════════════════════════════════════
// Bubble grid
// ═══════════════════════════════════════════════════════════════════════════
const GAP = 4;
let bubbleEls = [];
const poppedSet = new Set();
let gCols = 0, gRows = 0, gCellSize = 0;

function buildGrid(w, h) {
  const cellSize   = state.cellSize;
  const bubbleSize = cellSize - GAP;
  const cols = Math.max(2, Math.floor(w / cellSize));
  const rows = Math.max(2, Math.floor(h / cellSize));
  const total = cols * rows;

  if (cols === gCols && rows === gRows && cellSize === gCellSize) return;

  const sizeChanged = cellSize !== gCellSize;
  gCols = cols; gRows = rows; gCellSize = cellSize;

  $grid.style.gridTemplateColumns = `repeat(${cols}, ${bubbleSize}px)`;
  $grid.style.gap = `${GAP}px`;

  if (sizeChanged) {
    for (const el of $grid.children) el.style.width = el.style.height = bubbleSize + 'px';
  }

  while ($grid.children.length > total) {
    const removed = $grid.removeChild($grid.lastChild);
    const bi = parseInt(removed.dataset.bi);
    if (poppedSet.has(bi)) { poppedSet.delete(bi); state.poppedCount = Math.max(0, state.poppedCount - 1); }
  }

  const prev = $grid.children.length;
  for (let i = prev; i < total; i++) {
    const el = document.createElement('div');
    el.className = 'bubble bubble-unpopped';
    el.style.cssText = `width:${bubbleSize}px;height:${bubbleSize}px`;
    el.dataset.bi = i;
    $grid.appendChild(el);
  }

  bubbleEls = Array.from($grid.children);
  state.totalBubbles = total;
  updateStats();
}

function resetBubbleStates() {
  stopGhostMode();
  poppedSet.clear();
  state.poppedCount = 0;
  popTimes.length = 0;
  for (const el of bubbleEls) {
    el._gen = (el._gen || 0) + 1;
    el.className = 'bubble bubble-unpopped';
  }
  updateStats();
}

function resetSheet() {
  gCols = 0; gRows = 0; gCellSize = 0; // force full rebuild
  const rect = $sheet.getBoundingClientRect();
  buildGrid(rect.width - 16, rect.height - 16);
  resetBubbleStates();
}

// ═══════════════════════════════════════════════════════════════════════════
// Popping
// ═══════════════════════════════════════════════════════════════════════════
function popBubble(index) {
  if (index < 0 || index >= state.totalBubbles) return;
  if (poppedSet.has(index)) return;

  poppedSet.add(index);
  state.poppedCount++;

  const now = Date.now();
  popTimes.push(now);

  audio.pop();
  if (navigator.vibrate) navigator.vibrate(12); // haptic on Android

  const el = bubbleEls[index];
  if (el) {
    el._gen = (el._gen || 0) + 1;
    const gen = el._gen;
    el.className = 'bubble bubble-popping';
    setTimeout(() => {
      if (el._gen === gen) el.className = 'bubble bubble-popped';
    }, 150);
  }

  updateStats();

  if (state.poppedCount === state.totalBubbles) {
    onSheetComplete();
  }
}

function bubbleAt(x, y) {
  for (const el of document.elementsFromPoint(x, y)) {
    if (el.dataset && el.dataset.bi !== undefined) return parseInt(el.dataset.bi);
  }
  return -1;
}

// ═══════════════════════════════════════════════════════════════════════════
// Sheet completion
// ═══════════════════════════════════════════════════════════════════════════
function onSheetComplete() {
  audio.completion();

  $statPct.classList.add('sparkle');
  $statPct.addEventListener('animationend', () => $statPct.classList.remove('sparkle'), { once: true });

  if (state.ghostMode) {
    setTimeout(startGhostMode, 1200);
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// Ghost mode — slowly re-inflates random popped bubbles after completion
// ═══════════════════════════════════════════════════════════════════════════
let ghostInterval = null;

function startGhostMode() {
  if (ghostInterval) return;
  ghostInterval = setInterval(() => {
    if (!state.ghostMode) { stopGhostMode(); return; }
    const candidates = [...poppedSet];
    if (candidates.length === 0) { stopGhostMode(); return; }

    const idx = candidates[Math.floor(Math.random() * candidates.length)];
    poppedSet.delete(idx);
    state.poppedCount--;

    const el = bubbleEls[idx];
    if (el) {
      el._gen = (el._gen || 0) + 1;
      const gen = el._gen;
      el.className = 'bubble bubble-reinflating';
      setTimeout(() => {
        if (el._gen === gen) el.className = 'bubble bubble-unpopped';
      }, 400);
    }
    updateStats();
  }, 1500);
}

function stopGhostMode() {
  clearInterval(ghostInterval);
  ghostInterval = null;
}

// ═══════════════════════════════════════════════════════════════════════════
// Stats
// ═══════════════════════════════════════════════════════════════════════════
function updateStats() {
  // Pop counter bump animation
  $statPop.classList.remove('count-bump');
  void $statPop.offsetWidth; // force reflow to restart animation
  $statPop.classList.add('count-bump');
  $statPop.textContent = state.poppedCount;

  const pct = state.totalBubbles > 0
    ? Math.round((state.poppedCount / state.totalBubbles) * 100) : 0;
  $statPct.textContent = pct + '%';
}

setInterval(() => {
  const cutoff = Date.now() - 2000;
  while (popTimes.length && popTimes[0] < cutoff) popTimes.shift();
  $statBps.textContent = (popTimes.length / 2).toFixed(1);
}, 200);

// ═══════════════════════════════════════════════════════════════════════════
// Pointer events
// ═══════════════════════════════════════════════════════════════════════════
$sheet.addEventListener('pointerdown', (e) => {
  state.isPointerDown = true;
  $sheet.setPointerCapture(e.pointerId);
  $sheet.classList.add('grabbing');
  const idx = bubbleAt(e.clientX, e.clientY);
  if (idx >= 0) popBubble(idx);
});

$sheet.addEventListener('pointermove', (e) => {
  if (!state.isPointerDown || !state.manicMode) return;
  const idx = bubbleAt(e.clientX, e.clientY);
  if (idx >= 0) popBubble(idx);
});

$sheet.addEventListener('pointerup',     () => { state.isPointerDown = false; $sheet.classList.remove('grabbing'); });
$sheet.addEventListener('pointercancel', () => { state.isPointerDown = false; $sheet.classList.remove('grabbing'); });
$sheet.addEventListener('contextmenu',   (e) => e.preventDefault());

// ═══════════════════════════════════════════════════════════════════════════
// Controls
// ═══════════════════════════════════════════════════════════════════════════
chkSound.addEventListener('change', () => {
  state.soundEnabled = chkSound.checked;
  audio.setEnabled(state.soundEnabled);
});

chkManic.addEventListener('change', () => {
  state.manicMode = chkManic.checked;
  $sheet.classList.toggle('manic-cursor', state.manicMode);
});

chkGhost.addEventListener('change', () => {
  state.ghostMode = chkGhost.checked;
  if (!state.ghostMode) stopGhostMode();
});

// Size presets
document.querySelectorAll('[data-size]').forEach(btn => {
  btn.addEventListener('click', () => {
    state.cellSize = parseInt(btn.dataset.size);
    document.querySelectorAll('[data-size]').forEach(b => b.classList.toggle('active', b === btn));
    resetSheet();
  });
});

// Color swatches
document.querySelectorAll('.swatch').forEach(sw => {
  sw.addEventListener('click', () => {
    const theme = sw.dataset.theme;
    document.body.className = document.body.className
      .replace(/\btheme-\S+/g, '').trim();
    if (theme) document.body.classList.add('theme-' + theme);
    document.querySelectorAll('.swatch').forEach(s => s.classList.toggle('active', s === sw));
  });
});

// Fresh Sheet
btnFresh.addEventListener('click', () => {
  resetSheet();
  btnFresh.textContent = 'ahhh new';
  setTimeout(() => { btnFresh.textContent = 'Fresh Sheet'; }, 1400);
  audio.fresh();
});

// Share score
btnShare.addEventListener('click', async () => {
  const pct  = state.totalBubbles > 0
    ? Math.round((state.poppedCount / state.totalBubbles) * 100) : 0;
  const text = `I popped ${state.poppedCount}/${state.totalBubbles} bubbles (${pct}%) on Virtual Bubble Wrap!`;

  try {
    if (navigator.share) { await navigator.share({ text }); return; }
    await navigator.clipboard.writeText(text);
    btnShare.textContent = 'Copied!';
    setTimeout(() => { btnShare.textContent = 'Share Score'; }, 2000);
  } catch (_) {}
});

// ═══════════════════════════════════════════════════════════════════════════
// Keyboard shortcuts
// ═══════════════════════════════════════════════════════════════════════════
window.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  switch (e.key.toLowerCase()) {
    case 'm': chkManic.checked = !chkManic.checked; chkManic.dispatchEvent(new Event('change')); break;
    case 's': chkSound.checked = !chkSound.checked; chkSound.dispatchEvent(new Event('change')); break;
    case 'r': btnFresh.click(); break;
  }
});

// ═══════════════════════════════════════════════════════════════════════════
// Responsive grid
// ═══════════════════════════════════════════════════════════════════════════
const ro = new ResizeObserver(() => {
  const rect = $sheet.getBoundingClientRect();
  if (rect.width < 10 || rect.height < 10) return;
  buildGrid(rect.width - 16, rect.height - 16);
});
ro.observe($sheet);
</script>
</body>
</html>
